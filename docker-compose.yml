# 本地需要 PostgreSQL 时: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: multilingual
      POSTGRES_PASSWORD: multilingual
      POSTGRES_DB: multilingual
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

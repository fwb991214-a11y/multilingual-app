# Render Blueprint: https://render.com/docs/blueprint-spec
# 在 Render Dashboard → New → Blueprint → 连接本仓库后一键创建 Web + Postgres

services:
  - type: web
    name: multilingual-app
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: multilingual-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_translations,write_translations,read_products,read_content,read_locales,write_locales,read_online_store_navigation,read_themes

databases:
  - name: multilingual-db
    plan: free
    databaseName: multilingual
    user: multilingual
